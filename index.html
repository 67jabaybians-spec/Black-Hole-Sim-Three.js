<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Black Hole Simulation</title>
  <style>
    * { margin: 0; padding: 0; overflow: hidden; }
    body { background: #000; }
    #gui { position: absolute; top: 10px; left: 10px; z-index: 10; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="gui"></div>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
    import { GUI } from 'https://unpkg.com/three@0.160.0/examples/jsm/libs/lil-gui.module.min.js';

    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    camera.position.z = 5;

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    // Load space background
    const textureLoader = new THREE.TextureLoader();
    const spaceTexture = textureLoader.load('https://raw.githubusercontent.com/creativetimofficial/public-assets/master/astro-assets/images/particles/space.jpg');

    // Shader material for black hole
    const fragmentShader = `
      uniform sampler2D uSpaceTexture;
      uniform vec2 uResolution;
      uniform float uTime;
      
      varying vec2 vUv;
      
      // Hash function for procedural stars
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      // Star field
      float stars(vec3 dir) {
        vec2 uv = dir.xy / dir.z;
        uv += floor(uTime * 0.1);
        vec2 grid = floor(uv * 20.0);
        vec2 frac = fract(uv * 20.0);
        float h = hash(grid);
        vec2 star = 0.5 + 0.5 * sin(h + uTime + grid.xyx).xy;
        float dist = length(frac - star);
        return smoothstep(0.05, 0.0, dist) * (0.8 + 0.2 * sin(h * 100.0));
      }
      
      // Black hole raymarch
      vec3 raymarch(vec3 ro, vec3 rd) {
        float M = 1.0; // Black hole mass
        vec3 p = ro;
        float h2 = pow(length(cross(p, rd)), 2.0); // Angular momentum squared
      
        for (int i = 0; i < 64; i++) {
          float r = length(p);
          if (r < 1.0) break; // Inside event horizon (rs = 2M = 2 → use 1 for margin)
      
          // Schwarzschild geodesic acceleration
          vec3 acc = -1.5 * h2 * p / pow(r, 6.0);
          p += rd * 0.1 + acc * 0.01;
        }
      
        return p;
      }
      
      void main() {
        vec2 uv = vUv;
        vec2 fragCoord = (uv - 0.5) * 2.0;
      
        vec3 ro = vec3(0, 0, 5);
        vec3 rd = normalize(vec3(fragCoord, -1));
      
        vec3 pos = raymarch(ro, rd);
        float r = length(pos);
      
        // Sample background
        vec3 bg = texture2D(uSpaceTexture, (atan(pos.x, pos.z) * 0.1591, asin(pos.y) * 0.3183) + 0.5).rgb;
        bg += stars(normalize(pos));
      
        // Accretion disk (at y = 0, between r = 1.5 and 3.0)
        float disk = 0.0;
        if (abs(pos.y) < 0.02 && r > 1.5 && r < 3.0) {
          float phi = atan(pos.x, pos.z);
          float temp = pow(r, -0.75); // T ∝ r^(-3/4)
          float pulse = sin(phi * 10.0 + uTime) * 0.5 + 0.5;
          disk = 2.0 * temp * pulse;
          disk *= smoothstep(0.02, 0.01, abs(pos.y));
        }
      
        vec3 color = bg + vec3(1.0, 0.3, 0.1) * disk;
      
        gl_FragColor = vec4(color, 1.0);
      }   
    `;

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const material = new THREE.ShaderMaterial({
      uniforms: {
        uSpaceTexture: { value: spaceTexture },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uTime: { value: 0.0 }
      },
      fragmentShader,
      vertexShader,
    });

    const plane = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(plane, material);
    scene.add(mesh);

    // Particle system
    const particleCount = 10000;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      const r = 0.5 + Math.random() * 1.5;
      const theta = Math.random() * Math.PI * 2;
      positions[i * 3] = r * Math.cos(theta);
      positions[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
      positions[i * 3 + 2] = r * Math.sin(theta);
    }
    const particleGeom = new THREE.BufferGeometry();
    particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.02, transparent: true, opacity: 0.8 });
    const particleSystem = new THREE.Points(particleGeom, particleMaterial);
    scene.add(particleSystem);

    // GUI
    const gui = new GUI({ container: document.getElementById('gui') });
    gui.add(material.uniforms.uTime, 'value', 0, 10, 0.01).name('Time');
    gui.add(bloomPass, 'strength', 0, 3, 0.01).name('Bloom Strength');

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      material.uniforms.uTime.value += 0.01;
      particleSystem.rotation.z -= 0.0005;
      composer.render();
    }
    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      material.uniforms.uResolution.value.set(width, height);
      composer.setSize(width, height);
    });
  </script>
</body>
</html>
