<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Black Hole Simulation • Improved</title>

<style>
  * { margin: 0; padding: 0; overflow: hidden; }
  body { background: black; }
  #gui { position: absolute; top: 10px; left: 10px; z-index: 10; }
  #info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    opacity: 0.6;
    pointer-events: none;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>
<div id="gui"></div>
<div id="info">Realistic ray-marched accretion disk + gravitational lensing • 120 steps • GPU-optimized</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { GUI } from 'https://unpkg.com/three@0.160.0/examples/jsm/libs/lil-gui.module.min.js';

//////////////////////////
// SETUP
//////////////////////////

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0.8, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

//////////////////////////
// POST-PROCESSING (Bloom tuned for hot disk)
//////////////////////////

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.35,   // strength
  0.35,   // radius
  0.75    // threshold
);
composer.addPass(bloomPass);

//////////////////////////
// SHADER – Realistic Black Hole (ray-marched with proper accretion disk + lensing)
//////////////////////////

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 }
  },
  depthWrite: false,
  depthTest: false,
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;

    uniform float uTime;
    varying vec2 vUv;

    void main(){
      vec2 uv = vUv * 2.0 - 1.0;

      // Camera slightly above the disk plane for nice tilt
      vec3 ro = vec3(0.0, 0.85, 5.0);
      vec3 rd = normalize(vec3(uv * 1.15, -1.0));

      vec3 p = ro;
      float prevY = ro.y;

      vec3 col = vec3(0.0);
      float glow = 0.0;
      vec3 diskCol = vec3(0.0);

      const int MAX_STEPS = 120;
      float t = 0.0;

      for(int i = 0; i < MAX_STEPS; i++){
        float dist = length(p);

        // Event horizon (slightly larger than true Rs for visual shadow)
        if(dist < 0.85){
          gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
          return;
        }

        // Adaptive step size (faster far away)
        float stepSize = 0.035 + dist * 0.008;

        // Store previous position for plane-crossing test
        vec3 prevP = p;

        // Advance ray
        p += rd * stepSize;
        t += stepSize;

        // Gravitational lensing (Schwarzschild approximation)
        // Stronger deflection near the hole → realistic photon bending
        float force = 2.2 / (dist * dist * dist + 0.08);
        rd -= normalize(p) * force * stepSize * 4.0;
        rd = normalize(rd);

        // Photon sphere (bright ring at ~1.5 Rs)
        float photon = exp(-abs(dist - 1.52) * 12.0);
        glow += photon * 0.35;

        // Accretion disk: detect crossing of equatorial plane (y = 0)
        float currY = p.y;
        if(prevY * currY <= 0.0){
          // Interpolate exact crossing point
          float fraction = prevY / (prevY - currY);
          vec3 hitP = prevP + (p - prevP) * fraction;

          float r = length(hitP.xz);

          // Disk extends from just outside horizon to outer edge
          if(r > 0.9 && r < 5.5){
            // Temperature / brightness (falls off with radius)
            float brightness = pow(1.8 / r, 3.2) * 1.8;

            // Doppler + relativistic beaming
            // One side approaches (blueshift + brighter), other recedes (redshift)
            float angle = atan(hitP.z, hitP.x);
            float doppler = sin(angle + uTime * 1.2); // slow rotation for visual motion

            vec3 hot   = vec3(1.4, 0.55, 0.15);   // orange-white
            vec3 cool  = vec3(0.15, 0.7, 1.6);    // blue-white
            vec3 diskC = mix(hot, cool, doppler * 0.5 + 0.5);

            // Beaming boost on approaching side
            brightness *= (1.0 + doppler * 0.6);

            diskCol += diskC * brightness;
          }
        }

        prevY = currY;
      }

      // Final composition
      col += diskCol * 1.4;                    // bright disk
      col += vec3(1.4, 1.1, 0.9) * glow * 1.6; // photon ring (slightly yellowish)

      // Very faint outer halo / scattered light
      float outer = smoothstep(6.0, 2.0, length(p));
      col += vec3(0.4, 0.7, 1.0) * outer * 0.15;

      // Gentle flicker / turbulence
      col *= 0.92 + 0.18 * sin(uTime * 8.0 + uv.x * 12.0);

      // Darken outer edges slightly
      col *= smoothstep(12.0, 3.0, t);

      gl_FragColor = vec4(col, 1.0);
    }
  `
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(quad);

//////////////////////////
// PARTICLES (warmer colors, denser disk feel, still fully CPU-simulated for max compatibility)
//////////////////////////

const count = 8500; // more particles for richer look, still very fast
const positions = new Float32Array(count * 3);
const velocities = new Float32Array(count * 3);

for (let i = 0; i < count; i++) {
  const r = 1.2 + Math.random() * 2.8;
  const a = Math.random() * Math.PI * 2;

  const x = Math.cos(a) * r;
  const z = Math.sin(a) * r;
  const y = (Math.random() - 0.5) * 0.6; // slightly thicker disk

  positions[i*3]     = x;
  positions[i*3 + 1] = y;
  positions[i*3 + 2] = z;

  // Initial tangential velocity
  velocities[i*3]     = -z * 0.012;
  velocities[i*3 + 1] = 0;
  velocities[i*3 + 2] =  x * 0.012;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const mat = new THREE.PointsMaterial({
  color: 0xffaa44,
  size: 0.018,
  transparent: true,
  opacity: 0.75,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});

const particles = new THREE.Points(geo, mat);
particles.rotation.x = -0.65; // nice viewing angle matching shader camera
scene.add(particles);

//////////////////////////
// GUI
//////////////////////////

const gui = new GUI({ container: document.getElementById('gui'), width: 280 });
gui.add(material.uniforms.uTime, 'value', 0, 30).name('Time speed').listen();
gui.add(bloomPass, 'strength', 0, 3).name('Bloom strength');
gui.add(bloomPass, 'threshold', 0, 1).name('Bloom threshold');
gui.add(bloomPass, 'radius', 0, 1).name('Bloom radius');

//////////////////////////
// ANIMATION LOOP
//////////////////////////

let lastTime = 0;
function animate(timestamp){
  requestAnimationFrame(animate);

  const delta = Math.min((timestamp - lastTime) * 0.001, 0.1);
  lastTime = timestamp;

  material.uniforms.uTime.value += delta * 1.8; // faster visual motion

  // Update particles on CPU (still extremely fast even at 8500)
  const pos = geo.attributes.position.array;

  for (let i = 0; i < count; i++) {
    let ix = i * 3;
    let x = pos[ix];
    let y = pos[ix + 1];
    let z = pos[ix + 2];

    let vx = velocities[ix];
    let vy = velocities[ix + 1];
    let vz = velocities[ix + 2];

    const d2 = x*x + y*y + z*z;
    const d = Math.sqrt(d2);

    // Stronger Newtonian gravity
    const force = 0.0055 / (d2 + 0.08);

    vx -= x * force;
    vy -= y * force;
    vz -= z * force;

    // Stronger orbital swirl + inner boost
    const spin = 0.0028;
    vx += -z * spin;
    vz +=  x * spin;

    if (d < 1.4) {
      vx *= 1.015;
      vz *= 1.015;
    }

    // Update position
    x += vx * 0.98; // slight drag for stability
    y += vy;
    z += vz;

    // Reset swallowed particles farther out with fresh orbital velocity
    if (d < 0.85) {
      const r = 2.2 + Math.random() * 2.4;
      const a = Math.random() * Math.PI * 2;
      x = Math.cos(a) * r;
      z = Math.sin(a) * r;
      y = (Math.random() - 0.5) * 0.6;

      vx = -z * 0.014;
      vz =  x * 0.014;
      vy = 0;
    }

    pos[ix]     = x;
    pos[ix + 1] = y;
    pos[ix + 2] = z;

    velocities[ix]     = vx;
    velocities[ix + 1] = vy;
    velocities[ix + 2] = vz;
  }

  geo.attributes.position.needsUpdate = true;

  composer.render();
}

animate();

//////////////////////////
// RESIZE
//////////////////////////

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
