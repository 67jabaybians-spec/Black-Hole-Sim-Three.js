<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Black Hole Simulation</title>

<style>
  * { margin: 0; padding: 0; overflow: hidden; }
  body { background: black; }
  #gui { position: absolute; top: 10px; left: 10px; z-index: 10; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>
<div id="gui"></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { GUI } from 'https://unpkg.com/three@0.160.0/examples/jsm/libs/lil-gui.module.min.js';

//////////////////////////
// SETUP
//////////////////////////

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

//////////////////////////
// POST
//////////////////////////

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.2,
  0.4,
  0.85
);
bloomPass.threshold = 0.1;
composer.addPass(bloomPass);

//////////////////////////
// TEXTURE
//////////////////////////

const tex = new THREE.TextureLoader().load(
'https://raw.githubusercontent.com/creativetimofficial/public-assets/master/astro-assets/images/particles/space.jpg'
);

//////////////////////////
// SHADERS
//////////////////////////

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uSpaceTexture: { value: tex }
  },
  depthWrite: false,
  depthTest: false,
  vertexShader: `
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;

    uniform sampler2D uSpaceTexture;
    uniform float uTime;
    varying vec2 vUv;

    float hash(vec2 p){
      return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
    }

    float stars(vec3 dir){
      float z = abs(dir.z) + 0.3;
      vec2 uv = dir.xy / z;
      uv *= 60.0;

      vec2 grid = floor(uv);
      vec2 frac = fract(uv);

      float h = hash(grid);
      vec2 starPos = fract(vec2(h, hash(grid+1.0)) * 100.0);

      float dist = length(frac - starPos);
      return smoothstep(0.05, 0.0, dist) * 0.5;
    }

    vec3 raymarch(vec3 ro, vec3 rd, out float disk){
      disk = 0.0;
      vec3 p = ro;

      for(int i=0;i<64;i++){
        float r = length(p);
        if(r < 0.8) return vec3(0.0);

        vec3 acc = -p / (r*r*r);
        vec3 prev = p;

        p += rd * 0.1 + acc * 0.02;

        if(prev.y * p.y < 0.0){
          float t = -prev.y / (p.y - prev.y);
          vec3 hit = prev + t*(p-prev);

          float hr = length(hit.xz);
          if(hr > 1.0 && hr < 2.5){
            disk = (1.0 / hr) * 0.3;
          }
        }
      }
      return p;
    }

    void main(){
      vec2 uv = vUv * 2.0 - 1.0;

      vec3 ro = vec3(0.0,0.0,3.0);
      vec3 rd = normalize(vec3(uv, -1.5));

      float disk;
      vec3 pos = raymarch(ro, rd, disk);

      vec3 dir = normalize(pos - ro);
      dir.z = max(dir.z, 0.2);

      vec2 bgUV = dir.xy * 0.5 + 0.5;
      vec3 bg = texture2D(uSpaceTexture, bgUV).rgb;

      float star = stars(dir);

      vec3 diskColor = vec3(1.0,0.5,0.2) * disk;

      vec3 color = bg * 0.5 + vec3(star) * 1.5 + diskColor * 2.0;
      color = clamp(color, 0.0, 1.0);

      gl_FragColor = vec4(color,1.0);
    }
  `
});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

//////////////////////////
// PARTICLES (REAL MOTION)
//////////////////////////

const count = 6000;
const positions = new Float32Array(count * 3);
const velocities = new Float32Array(count * 3);

for (let i = 0; i < count; i++) {
  const r = 1 + Math.random() * 2;
  const a = Math.random() * Math.PI * 2;

  const x = Math.cos(a) * r;
  const z = Math.sin(a) * r;
  const y = (Math.random() - 0.5) * 0.5;

  positions[i*3] = x;
  positions[i*3+1] = y;
  positions[i*3+2] = z;

  velocities[i*3] = -z * 0.01;
  velocities[i*3+1] = 0;
  velocities[i*3+2] = x * 0.01;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));

const mat = new THREE.PointsMaterial({
  color: 0x00ffff,
  size: 0.02,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particles = new THREE.Points(geo, mat);
particles.rotation.x = 0.4;
scene.add(particles);

//////////////////////////
// GUI
//////////////////////////

const gui = new GUI({ container: document.getElementById('gui') });
gui.add(material.uniforms.uTime, 'value', 0, 20).name('Time');
gui.add(bloomPass, 'strength', 0, 3).name('Bloom');

//////////////////////////
// LOOP
//////////////////////////

function animate(){
  requestAnimationFrame(animate);

  material.uniforms.uTime.value += 0.01;

  const pos = geo.attributes.position.array;

  for (let i = 0; i < count; i++) {
    let ix = i*3;

    let x = pos[ix];
    let y = pos[ix+1];
    let z = pos[ix+2];

    let vx = velocities[ix];
    let vy = velocities[ix+1];
    let vz = velocities[ix+2];

    const d = Math.sqrt(x*x + y*y + z*z);

    const force = 0.0005 / (d*d + 0.1);

    vx -= x * force;
    vy -= y * force;
    vz -= z * force;

    vx *= 0.999;
    vz *= 0.999;

    x += vx;
    y += vy;
    z += vz;

    if (d < 0.5) {
      const r = 2 + Math.random() * 2;
      const a = Math.random() * Math.PI * 2;

      x = Math.cos(a) * r;
      z = Math.sin(a) * r;
      y = (Math.random() - 0.5) * 0.5;

      vx = -z * 0.01;
      vz = x * 0.01;
      vy = 0;
    }

    pos[ix] = x;
    pos[ix+1] = y;
    pos[ix+2] = z;

    velocities[ix] = vx;
    velocities[ix+1] = vy;
    velocities[ix+2] = vz;
  }

  geo.attributes.position.needsUpdate = true;

  composer.render();
}

animate();

//////////////////////////
// RESIZE
//////////////////////////

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
