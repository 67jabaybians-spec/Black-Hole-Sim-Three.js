<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Black Hole Simulation</title>

<style>
  * { margin: 0; padding: 0; overflow: hidden; }
  body { background: black; }
  #gui { position: absolute; top: 10px; left: 10px; z-index: 10; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>
<div id="gui"></div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { GUI } from 'https://unpkg.com/three@0.160.0/examples/jsm/libs/lil-gui.module.min.js';

//////////////////////////
// BASIC SETUP
//////////////////////////

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);

//////////////////////////
// POST PROCESSING
//////////////////////////

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.2,
  0.4,
  0.85
);

composer.addPass(bloomPass);

//////////////////////////
// TEXTURE
//////////////////////////

const textureLoader = new THREE.TextureLoader();
const spaceTexture = textureLoader.load(
  'https://raw.githubusercontent.com/creativetimofficial/public-assets/master/astro-assets/images/particles/space.jpg'
);

//////////////////////////
// SHADERS
//////////////////////////

const vertexShader = `
varying vec2 vUv;
void main(){
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
`;

const fragmentShader = `
uniform sampler2D uSpaceTexture;
uniform float uTime;
varying vec2 vUv;

float hash(vec2 p){
  return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
}

float stars(vec3 dir){
  vec2 uv = dir.xy / max(dir.z, 0.2);
  uv *= 80.0;
  vec2 grid = floor(uv);
  vec2 frac = fract(uv);

  float h = hash(grid);
  vec2 starPos = fract(vec2(h, hash(grid+1.0)) * 100.0);

  float dist = length(frac - starPos);
  return smoothstep(0.05, 0.0, dist);
}

vec3 raymarch(vec3 ro, vec3 rd, out float disk){
  disk = 0.0;
  vec3 p = ro;

  for(int i=0;i<64;i++){
    float r = length(p);
    if(r < 0.8) return vec3(0.0);

    vec3 acc = -p / (r*r*r);
    vec3 prev = p;

    p += rd * 0.1 + acc * 0.02;

    if(prev.y * p.y < 0.0){
      float t = -prev.y / (p.y - prev.y);
      vec3 hit = prev + t*(p-prev);

      float hr = length(hit.xz);
      if(hr > 1.0 && hr < 2.5){
        float glow = 1.0 / hr;
        disk = glow * (0.6 + 0.4*sin(uTime + hr*5.0));
      }
    }
  }
  return p;
}

void main(){
  vec2 uv = vUv * 2.0 - 1.0;

  vec3 ro = vec3(0.0,0.0,3.0);
  vec3 rd = normalize(vec3(uv, -1.5));

  float disk;
  vec3 pos = raymarch(ro, rd, disk);

  vec3 dir = normalize(pos - ro);
  dir.z = max(dir.z, 0.2);

  vec2 bgUV = dir.xy * 0.5 + 0.5;
  vec3 bg = texture2D(uSpaceTexture, bgUV).rgb;

  float star = stars(dir);

  vec3 diskColor = vec3(1.0,0.5,0.2) * disk;

  vec3 color = bg * 0.5 + vec3(star) * 2.0 + diskColor * 3.0;

  gl_FragColor = vec4(color,1.0);
}
`;

//////////////////////////
// FULLSCREEN QUAD
//////////////////////////

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uSpaceTexture: { value: spaceTexture }
  },
  vertexShader,
  fragmentShader,
  depthWrite: false,
  depthTest: false
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(quad);

//////////////////////////
// PARTICLE DISK
//////////////////////////

const count = 6000;
const positions = new Float32Array(count * 3);

for (let i = 0; i < count; i++) {
  const r = 1 + Math.random() * 1.5;
  const a = Math.random() * Math.PI * 2;

  positions[i * 3] = Math.cos(a) * r;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 0.05;
  positions[i * 3 + 2] = Math.sin(a) * r;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const mat = new THREE.PointsMaterial({
  color: 0x00ffff,
  size: 0.02,
  transparent: true,
  opacity: 0.8
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

//////////////////////////
// GUI
//////////////////////////

const gui = new GUI({ container: document.getElementById('gui') });
gui.add(material.uniforms.uTime, 'value', 0, 20).name('Time');
gui.add(bloomPass, 'strength', 0, 3).name('Bloom');

//////////////////////////
// LOOP
//////////////////////////

function animate(){
  requestAnimationFrame(animate);

  material.uniforms.uTime.value += 0.01;

  particles.rotation.y += 0.002;

  composer.render();
}

animate();

//////////////////////////
// RESIZE
//////////////////////////

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;

  renderer.setSize(w, h);
  composer.setSize(w, h);

  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
